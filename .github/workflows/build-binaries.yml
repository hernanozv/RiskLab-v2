name: Build Binaries (Windows + macOS)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Crear un GitHub Release con los binarios'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Tag para el release (ej: v1.0.0). Solo se usa si create_release=true'
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Risk_Lab_Beta-windows
            asset_ext: zip
          - os: macos-latest
            artifact_name: Risk_Lab_Beta-macos
            asset_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip + wheel
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pip install --prefer-binary -r requirements.txt

      - name: Install dependencies (macOS) - filter Windows-only packages
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Excluir paquetes Windows-only que rompen el install en macOS
          grep -v -E '^(pywin32|pywinpty)([=<>!~]|$)' requirements.txt > requirements-mac.txt
          pip install --prefer-binary -r requirements-mac.txt

      - name: Show installed versions
        shell: bash
        run: |
          python --version
          pip show pyinstaller numpy scipy PyQt5 matplotlib | grep -E '^(Name|Version)'

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean Risk_Lab_Beta.spec

      - name: List build output
        shell: bash
        run: |
          ls -la dist/
          if [ -d "dist/Risk_Lab_Beta" ]; then
            echo "--- Contents of dist/Risk_Lab_Beta ---"
            ls -la dist/Risk_Lab_Beta | head -30
          fi

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Risk_Lab_Beta/* -DestinationPath Risk_Lab_Beta-windows.zip

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd dist
          # En macOS PyInstaller puede generar un .app bundle y/o un directorio Risk_Lab_Beta
          if [ -d "Risk_Lab_Beta.app" ]; then
            zip -r ../Risk_Lab_Beta-macos.zip Risk_Lab_Beta.app
          fi
          if [ -d "Risk_Lab_Beta" ]; then
            zip -r ../Risk_Lab_Beta-macos.zip Risk_Lab_Beta
          fi
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: Risk_Lab_Beta-*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.release_tag != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: |
          find artifacts -type f -ls

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Risk Lab ${{ steps.tag.outputs.tag }}
          body: |
            Binarios autogenerados para Risk Lab.

            **Notas:**
            - Los binarios no estan firmados. En Windows, SmartScreen puede pedir
              confirmacion ("Mas informacion" > "Ejecutar de todas formas").
            - En macOS, Gatekeeper bloqueara la app la primera vez. Hay que ir a
              Preferencias del Sistema > Seguridad y Privacidad y autorizar la
              ejecucion, o quitarle el atributo con:
              `xattr -d com.apple.quarantine Risk_Lab_Beta.app`
          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: false
