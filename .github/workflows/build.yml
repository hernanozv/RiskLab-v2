name: Build Executables

on:
  push:
    tags:
      - 'build/windows'
      - 'build/macos'
      - 'build/all'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - all

jobs:
  build-windows:
    runs-on: windows-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all')) ||
      (github.event_name == 'push' && (endsWith(github.ref, 'build/windows') || endsWith(github.ref, 'build/all') || startsWith(github.ref, 'refs/tags/v')))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller Risk_Lab_Beta.spec

      - name: Zip output
        run: Compress-Archive -Path dist\Risk_Lab_Beta -DestinationPath RiskLab-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiskLab-Windows
          path: RiskLab-Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-13
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all')) ||
      (github.event_name == 'push' && (endsWith(github.ref, 'build/macos') || endsWith(github.ref, 'build/all') || startsWith(github.ref, 'refs/tags/v')))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller Risk_Lab_Beta_mac.spec

      - name: Zip output
        run: zip -r RiskLab-macOS.zip "dist/Risk Lab Beta.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiskLab-macOS
          path: RiskLab-macOS.zip
          retention-days: 7

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: RiskLab-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: RiskLab-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RiskLab-Windows.zip
            RiskLab-macOS.zip
          generate_release_notes: true
